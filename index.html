<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Oracle | 潜意识绘本</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap');
        body { background: linear-gradient(180deg, #0B0B0D 0%, #1A1A2E 100%); color: #F5F5F5; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; min-height: 100vh; }
        .dream-font { font-family: 'Ma Shan Zheng', cursive; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .ink-appear { animation: inkFade 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        @keyframes inkFade { from { opacity: 0; transform: translateY(20px); filter: blur(10px); } to { opacity: 1; transform: translateY(0); filter: blur(0); } }
    </style>
</head>
<body class="flex flex-col items-center p-4 sm:p-8">

    <header class="w-full max-w-xl flex justify-between items-center mb-12 z-10">
        <div class="flex items-center gap-3">
            <div id="status-dot" class="w-2 h-2 rounded-full bg-yellow-600 animate-pulse"></div>
            <span class="tracking-[0.4em] text-[10px] text-yellow-600/80 font-light uppercase">Dream Oracle V5.3</span>
        </div>
        <div class="flex gap-2">
            <button onclick="location.reload()" class="p-2 hover:bg-white/5 rounded-full transition-colors text-gray-500 hover:text-white"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
            <button onclick="toggleSettings()" class="p-2 hover:bg-white/5 rounded-full transition-colors text-gray-500 hover:text-yellow-600"><i data-lucide="key" class="w-4 h-4"></i></button>
        </div>
    </header>

    <main class="w-full max-w-xl z-10">
        <section id="input-view" class="space-y-10 py-10">
            <div class="text-center space-y-4">
                <h1 class="text-5xl text-white/90 dream-font tracking-tight">捕捉潜意识的碎片</h1>
                <p class="text-gray-400 text-sm italic font-light">占梦师正在深潜，请描述你的梦境...</p>
            </div>
            <div class="glass-card p-8 space-y-6">
                <textarea id="dream-input" rows="6" class="w-full bg-transparent border-none focus:ring-0 text-lg placeholder-gray-800 resize-none leading-relaxed" placeholder="描述你梦中的意象..."></textarea>
            </div>
            <button onclick="startOracle()" id="submit-btn" class="w-full py-5 bg-yellow-950/10 border border-yellow-700/20 rounded-full text-yellow-600 tracking-[0.6em] font-light hover:bg-yellow-900/20 transition-all flex justify-center items-center gap-2">
                递给占梦师 <i data-lucide="sparkles" class="w-4 h-4"></i>
            </button>
        </section>

        <section id="oracle-view" class="hidden space-y-8 pb-32">
            <div id="chat-flow" class="space-y-8"></div>
            <div id="loading-area" class="hidden py-10 flex flex-col items-center space-y-4">
                <div class="w-8 h-8 border-2 border-yellow-600/10 border-t-yellow-600 rounded-full animate-spin"></div>
                <p class="text-[10px] text-yellow-600/50 italic tracking-widest text-center">正在读取潜意识信号...</p>
            </div>
            <div id="reply-box" class="hidden glass-card p-3 flex gap-4 sticky bottom-6 shadow-2xl">
                <input id="user-reply" type="text" class="flex-1 bg-transparent border-none focus:ring-0 text-sm px-4" placeholder="回应占梦师...">
                <button onclick="submitReply()" class="p-2 text-yellow-600 hover:scale-110 transition-transform"><i data-lucide="send" class="w-5 h-5"></i></button>
            </div>
        </section>
    </main>

    <!-- 设置弹窗 -->
    <div id="settings-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden z-50 flex items-center justify-center p-6">
        <div class="glass-card w-full max-w-sm p-8 space-y-6">
            <div class="text-center">
                <h3 class="text-yellow-600 dream-font text-3xl">感应密钥</h3>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest mt-2">API Key Configuration</p>
            </div>
            <input id="api-key-input" type="password" placeholder="粘贴你的 AI Studio Key" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-yellow-600/50 text-white">
            <button onclick="saveApiKey()" class="w-full py-4 bg-yellow-600/10 text-yellow-600 border border-yellow-600/20 rounded-xl text-xs tracking-[0.4em] hover:bg-yellow-600/20 transition-all font-bold">保存密钥</button>
            <button onclick="toggleSettings()" class="w-full text-[10px] text-gray-500 hover:text-white">取消</button>
        </div>
    </div>

    <script>
        let apiKey = localStorage.getItem('dream_oracle_key') || "";
        // 关键修复：改为使用 1.5-flash，这个模型配额极大且非常稳定
        const modelName = "gemini-1.5-flash"; 
        let chatHistory = [];
        let currentTurn = 0;

        const systemPrompt = `你是一位神秘占梦师。请基于荣格心理学，以神秘、温柔的口吻与用户对话。
        Turn 1 & 2: 引导提问。Turn 3: 给出分析结论、action和image_prompt。
        输出：严格JSON: {"analysis":"","question":"","action":"","image_prompt":"","is_crisis":false}`;

        lucide.createIcons();

        function toggleSettings() { document.getElementById('settings-modal').classList.toggle('hidden'); }
        function saveApiKey() {
            const val = document.getElementById('api-key-input').value.trim();
            if (val) { localStorage.setItem('dream_oracle_key', val); apiKey = val; toggleSettings(); alert("密钥已保存"); }
        }

        async function fetchOracle(text) {
            if (!apiKey) { toggleSettings(); throw new Error("请先点击右上角设置 API Key"); }
            chatHistory.push({ role: "user", parts: [{ text: text }] });
            
            // 使用 Vercel 代理路径
            const url = `/api/google/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: chatHistory,
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: { responseMimeType: "application/json", temperature: 0.8 }
            };

            const response = await fetch(url, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify(payload) 
            });
            
            const data = await response.json();
            if (!response.ok) throw new Error(data.error?.message || `HTTP ${response.status}`);
            
            const resultText = data.candidates[0].content.parts[0].text;
            chatHistory.push({ role: "model", parts: [{ text: resultText }] });
            return JSON.parse(resultText);
        }

        async function startOracle() {
            const val = document.getElementById('dream-input').value;
            if (!val) return;
            document.getElementById('input-view').classList.add('hidden');
            document.getElementById('oracle-view').classList.remove('hidden');
            document.getElementById('loading-area').classList.remove('hidden');
            try {
                const data = await fetchOracle(val);
                currentTurn = 1;
                renderStep(data);
            } catch (e) { 
                alert(`占梦失败: ${e.message}`); 
                location.reload(); 
            }
        }

        async function submitReply() {
            const val = document.getElementById('user-reply').value;
            if (!val) return;
            document.getElementById('user-reply').value = "";
            document.getElementById('reply-box').classList.add('hidden');
            document.getElementById('loading-area').classList.remove('hidden');
            try {
                const data = await fetchOracle(val);
                currentTurn++;
                renderStep(data);
            } catch (e) { alert(`感应中断: ${e.message}`); }
        }

        function renderStep(data) {
            document.getElementById('loading-area').classList.add('hidden');
            const flow = document.getElementById('chat-flow');
            const card = document.createElement('div');
            card.className = "glass-card p-10 space-y-8 ink-appear";
            card.innerHTML = `
                <div class="space-y-4">
                    <p class="text-[9px] tracking-[0.5em] text-yellow-600/40 uppercase font-bold">占梦师的私语</p>
                    <p class="text-xl italic font-light leading-relaxed text-gray-100">${data.analysis}</p>
                </div>
                ${data.question && currentTurn < 3 ? `<div class="pt-6 border-t border-white/5"><p class="text-sm text-gray-400 font-light italic">"${data.question}"</p></div>` : ''}
                ${data.action && currentTurn >= 3 ? `<div class="p-6 bg-yellow-900/10 rounded-3xl border border-yellow-700/20"><p class="text-[9px] text-yellow-700 uppercase tracking-widest mb-2">现实锚定</p><p class="text-sm text-yellow-600 font-medium">${data.action}</p></div>` : ''}
            `;
            flow.appendChild(card);
            if (currentTurn < 3) document.getElementById('reply-box').classList.remove('hidden');
            lucide.createIcons();
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
