<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Oracle | 潜意识绘本</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap');
        
        body {
            background: linear-gradient(180deg, #0B0B0D 0%, #1A1A2E 100%);
            color: #F5F5F5;
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .dream-font { font-family: 'Ma Shan Zheng', cursive; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
        }

        .crisis-mode {
            border: 1px solid rgba(239, 68, 68, 0.4);
            background: rgba(127, 29, 29, 0.15);
        }

        .ink-appear {
            animation: inkFade 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes inkFade {
            from { opacity: 0; transform: translateY(20px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(214, 158, 46, 0.2); border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col items-center p-4 sm:p-8">

    <!-- 顶部状态与设置 -->
    <header class="w-full max-w-xl flex justify-between items-center mb-12 z-10">
        <div class="flex items-center gap-3">
            <div id="status-dot" class="w-2 h-2 rounded-full bg-yellow-600 animate-pulse"></div>
            <span class="tracking-[0.4em] text-[10px] text-yellow-600/80 font-light uppercase">Dream Oracle V5.2 Final</span>
        </div>
        <div class="flex gap-2">
            <button onclick="resetApp()" class="p-2 hover:bg-white/5 rounded-full transition-colors text-gray-500 hover:text-white" title="重置对话">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
            </button>
            <button onclick="toggleSettings()" class="p-2 hover:bg-white/5 rounded-full transition-colors text-gray-500 hover:text-yellow-600" title="设置密钥">
                <i data-lucide="key" class="w-4 h-4"></i>
            </button>
        </div>
    </header>

    <main class="w-full max-w-xl z-10">
        <!-- 阶段 1: 梦境录入 -->
        <section id="input-view" class="space-y-10 py-10">
            <div class="text-center space-y-4">
                <h1 class="text-5xl text-white/90 dream-font tracking-tight">捕捉潜意识的碎片</h1>
                <p class="text-gray-400 text-sm italic font-light">描述那个梦境的余温，占梦师正在倾听...</p>
            </div>

            <div class="glass-card p-8 space-y-6">
                <div class="flex flex-wrap gap-2">
                    <button onclick="insertTag('森林')" class="px-3 py-1 rounded-full border border-white/5 text-[10px] hover:bg-white/5 transition-all"># 森林</button>
                    <button onclick="insertTag('坠落')" class="px-3 py-1 rounded-full border border-white/5 text-[10px] hover:bg-white/5 transition-all"># 坠落</button>
                    <button onclick="insertTag('深海')" class="px-3 py-1 rounded-full border border-white/5 text-[10px] hover:bg-white/5 transition-all"># 深海</button>
                    <button onclick="insertTag('被追逐')" class="px-3 py-1 rounded-full border border-white/5 text-[10px] hover:bg-white/5 transition-all"># 被追逐</button>
                </div>
                <textarea id="dream-input" rows="6" 
                    class="w-full bg-transparent border-none focus:ring-0 text-lg placeholder-gray-800 resize-none leading-relaxed"
                    placeholder="刚才的梦里..."></textarea>
            </div>

            <button onclick="startOracle()" id="submit-btn"
                class="w-full py-5 bg-yellow-950/10 border border-yellow-700/20 rounded-full text-yellow-600 tracking-[0.6em] font-light hover:bg-yellow-900/20 transition-all active:scale-95 flex justify-center items-center gap-2 group">
                递给占梦师 <i data-lucide="sparkles" class="w-4 h-4 group-hover:rotate-12 transition-transform"></i>
            </button>
        </section>

        <!-- 阶段 2: 占梦对话流 -->
        <section id="oracle-view" class="hidden space-y-8 pb-32">
            <div id="chat-flow" class="space-y-8"></div>

            <!-- 加载状态 -->
            <div id="loading-area" class="hidden py-10 flex flex-col items-center space-y-4">
                <div class="w-8 h-8 border-2 border-yellow-600/10 border-t-yellow-600 rounded-full animate-spin"></div>
                <p class="text-[10px] text-yellow-600/50 italic tracking-widest">正在深潜潜意识海...</p>
            </div>

            <!-- 底部回复框 -->
            <div id="reply-box" class="hidden glass-card p-3 flex gap-4 sticky bottom-6 shadow-2xl">
                <input id="user-reply" type="text" class="flex-1 bg-transparent border-none focus:ring-0 text-sm px-4" placeholder="回应占梦师的启示...">
                <button onclick="submitReply()" class="p-2 text-yellow-600 hover:scale-110 transition-transform">
                    <i data-lucide="send" class="w-5 h-5"></i>
                </button>
            </div>
        </section>
    </main>

    <!-- 设置模态框 -->
    <div id="settings-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden z-50 flex items-center justify-center p-6">
        <div class="glass-card w-full max-w-sm p-8 space-y-6">
            <div class="text-center">
                <h3 class="text-yellow-600 dream-font text-3xl">感应密钥</h3>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest mt-2">API Key Configuration</p>
            </div>
            <div class="space-y-2">
                <label class="text-[10px] text-gray-400 uppercase tracking-tighter ml-1">Gemini API Key</label>
                <input id="api-key-input" type="password" placeholder="AIza..." 
                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-yellow-600/50">
            </div>
            <div class="p-4 bg-yellow-900/10 border border-yellow-900/20 rounded-xl">
                <p class="text-[9px] text-yellow-700/80 leading-relaxed italic">
                    重要提示：为了防止 GitHub 自动封禁密钥，我们将 Key 存储在您的浏览器本地 (Local Storage) 中。请勿将包含 Key 的代码直接上传至公开仓库。
                </p>
            </div>
            <button onclick="saveApiKey()" class="w-full py-4 bg-yellow-600/10 text-yellow-600 border border-yellow-600/20 rounded-xl text-xs tracking-[0.4em] hover:bg-yellow-600/20 transition-all font-bold">
                保存配置
            </button>
            <button onclick="toggleSettings()" class="w-full text-[10px] text-gray-500 hover:text-white transition-colors">取消设置</button>
        </div>
    </div>

    <script>
        // --- 核心状态与配置 ---
        let apiKey = localStorage.getItem('dream_oracle_key') || "";
        const modelName = "gemini-2.0-flash";
        let currentTurn = 0;
        let chatHistory = [];

        const systemPrompt = `你是一位神秘占梦师。请基于荣格心理学，以神秘、温柔的口吻与用户对话。
任务要求：
1. 识别原型（阴影、阿尼玛、人格面具等），但用比喻代替术语。
2. Turn 1 & 2: 提出具象化的问题，引导用户描述感受（必须包含 2-3 个意象示例）。
3. Turn 3: 收束对话，给出总结、物理世界行动建议 (action) 以及 最终绘图词 (image_prompt)。
4. 危机干预：若识别到自伤意图，必须启用 Google Search 查找救助热线，标记 is_crisis 为 true。
5. 负面约束：对乱码或纯数字输入，拒绝解读并温柔引导。
输出格式：严格返回 JSON: {"analysis":"","question":"","action":"","image_prompt":"","is_crisis":boolean}`;

        lucide.createIcons();

        // --- UI 逻辑 ---
        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            document.getElementById('api-key-input').value = apiKey;
            modal.classList.toggle('hidden');
        }

        function saveApiKey() {
            const val = document.getElementById('api-key-input').value.trim();
            if (!val) return alert("请输入有效的 API Key");
            localStorage.setItem('dream_oracle_key', val);
            apiKey = val;
            toggleSettings();
            alert("密钥配置成功，占梦师已就绪。");
        }

        function insertTag(tag) {
            const input = document.getElementById('dream-input');
            input.value += (input.value ? ' ' : '') + '#' + tag;
        }

        function resetApp() {
            if (confirm("确定要让这一场梦境消散吗？")) location.reload();
        }

        // --- API 通信逻辑 ---
        async function fetchOracle(text) {
            if (!apiKey) {
                toggleSettings();
                throw new Error("API Key 未设置");
            }

            chatHistory.push({ role: "user", parts: [{ text: text }] });
            
            // 关键：使用 Vercel 反向代理路径
            const url = `/api/google/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: chatHistory,
                systemInstruction: { parts: [{ text: systemPrompt }] },
                tools: [{ "google_search": {} }], // 启用搜索工具以防危机干预
                generationConfig: { 
                    responseMimeType: "application/json",
                    temperature: 0.85 
                }
            };

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const errJson = await response.json();
                throw new Error(errJson.error?.message || `HTTP ${response.status}`);
            }

            const result = await response.json();
            const responseText = result.candidates[0].content.parts[0].text;
            chatHistory.push({ role: "model", parts: [{ text: responseText }] });
            return JSON.parse(responseText);
        }

        async function startOracle() {
            const val = document.getElementById('dream-input').value;
            if (!val) return;

            document.getElementById('input-view').classList.add('hidden');
            document.getElementById('oracle-view').classList.remove('hidden');
            document.getElementById('loading-area').classList.remove('hidden');

            try {
                const data = await fetchOracle(val);
                currentTurn = 1;
                renderStep(data);
            } catch (e) {
                console.error(e);
                alert(`迷雾太浓，占梦失败: ${e.message}\n\n提示：如果是 404，请检查 vercel.json 部署是否成功；如果是 401，请检查 API Key 是否有效。`);
                location.reload();
            }
        }

        async function submitReply() {
            const val = document.getElementById('user-reply').value;
            if (!val) return;

            document.getElementById('user-reply').value = "";
            document.getElementById('reply-box').classList.add('hidden');
            document.getElementById('loading-area').classList.remove('hidden');

            try {
                const data = await fetchOracle(val);
                currentTurn++;
                renderStep(data);
            } catch (e) {
                alert(`感应中断: ${e.message}`);
            }
        }

        function renderStep(data) {
            document.getElementById('loading-area').classList.add('hidden');
            const flow = document.getElementById('chat-flow');
            
            const card = document.createElement('div');
            card.className = `glass-card p-10 space-y-8 ink-appear ${data.is_crisis ? 'crisis-mode shadow-[0_0_30px_rgba(239,68,68,0.2)]' : ''}`;
            
            if (data.is_crisis) {
                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-red-600 animate-ping";
            }

            card.innerHTML = `
                <div class="space-y-4">
                    <p class="text-[9px] tracking-[0.5em] text-yellow-600/40 uppercase font-bold">
                        ${data.is_crisis ? '🚨 慈悲引导' : '占梦师的私语'}
                    </p>
                    <p class="text-xl italic font-light leading-relaxed text-gray-100">${data.analysis}</p>
                </div>
                ${data.question && currentTurn < 3 ? `<div class="pt-6 border-t border-white/5"><p class="text-sm text-gray-400 font-light italic">"${data.question}"</p></div>` : ''}
                ${data.action && (currentTurn >= 3 || data.is_crisis) ? `
                    <div class="p-6 bg-yellow-900/10 rounded-3xl border border-yellow-700/20">
                        <p class="text-[9px] text-yellow-700 uppercase tracking-widest mb-2">${data.is_crisis ? '现实的光亮' : '现实锚定'}</p>
                        <p class="text-sm text-yellow-600 font-medium">${data.action}</p>
                    </div>` : ''}
            `;
            
            flow.appendChild(card);

            // 最终轮绘图指令展示
            if (currentTurn >= 3 && !data.is_crisis) {
                const visual = document.createElement('div');
                visual.className = "text-center py-10 opacity-30 ink-appear";
                visual.innerHTML = `
                    <p class="text-[8px] uppercase tracking-[0.8em] text-gray-500 mb-2">Subconscious Visualization Prompt</p>
                    <p class="text-[8px] italic font-serif px-12 leading-relaxed">${data.image_prompt}</p>
                `;
                flow.appendChild(visual);
            }

            if (currentTurn < 3 && !data.is_crisis) {
                document.getElementById('reply-box').classList.remove('hidden');
            }
            
            lucide.createIcons();
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
